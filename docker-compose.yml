version: '3.8'
services:
  mysql-timesheet:
    image: mysql:8.0
    container_name: mysql-timesheet
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: timesheet-devops
    ports:
      - "3306:3306"
    volumes:
      - timesheetvol:/var/lib/mysql
    networks:
      - timesheet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
      start_period: 10s

  timesheet-app:
    build: .
    container_name: timesheet-app
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysql-timesheet:
        condition: service_healthy
    networks:
      - timesheet-network

networks:
  timesheet-network:
    driver: bridge

volumes:
  timesheetvol:
